name: CI

on:
  push:
    branches: [main, release]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Dispatch.sln

      - name: Build
        run: dotnet build Dispatch.sln --no-restore

      - name: Test
        run: dotnet test Dispatch.sln --no-build
