name: Deploy

on:
  # Manual trigger from any branch
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'both'
        type: choice
        options:
          - api
          - worker
          - both

  # Auto-trigger after CI succeeds on release
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [release]

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  DOTNET_VERSION: '10.x'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment: production
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target != 'worker')

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Api
        run: dotnet publish Api/Api.csproj -c Release -o ./publish/api

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.API_APP_NAME }}
          package: ./publish/api

  deploy-worker:
    runs-on: ubuntu-latest
    environment: production
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target != 'api')

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Worker
        run: dotnet publish Worker/Worker.csproj -c Release -o ./publish/worker

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1.5.5
        with:
          app-name: ${{ secrets.WORKER_APP_NAME }}
          package: ./publish/worker
